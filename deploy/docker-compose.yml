# docker-compose para a instância EC2.
# A imagem do app é construída no GitHub Actions e publicada no GHCR; aqui o EC2
# apenas faz `pull` (não compila). As migrações rodam no startup do app.
# Variáveis vêm do arquivo deploy/.env (ver deploy/.env.example).

services:
  db:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    image: ghcr.io/edybr/flight-visualizer-pro:${IMAGE_TAG:-latest}
    restart: always
    env_file:
      - .env
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy

  # Reverse proxy com HTTPS automático (Let's Encrypt). Assume as portas 80/443.
  # Enquanto o DNS de djiflaylog.app não apontar para cá, o bloco :80 do Caddyfile
  # mantém o app acessível por HTTP no IP; quando apontar, o cert é emitido sozinho.
  caddy:
    image: caddy:2
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  dbdata:
  caddy_data:
  caddy_config:
