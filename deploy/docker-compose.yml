# docker-compose para a instância EC2.
# Sobe: MySQL 8 (com volume persistente) -> migração do schema -> app Node.
# Variáveis vêm do arquivo deploy/.env (ver deploy/.env.example).

services:
  db:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    build:
      context: ..
      target: build
    command: pnpm drizzle-kit migrate
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: ..
      target: runtime
    restart: always
    env_file:
      - .env
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # Reverse proxy com HTTPS automático (Let's Encrypt). Assume as portas 80/443.
  # Enquanto o DNS de djiflaylog.app não apontar para cá, o bloco :80 do Caddyfile
  # mantém o app acessível por HTTP no IP; quando apontar, o cert é emitido sozinho.
  caddy:
    image: caddy:2
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  dbdata:
  caddy_data:
  caddy_config:
