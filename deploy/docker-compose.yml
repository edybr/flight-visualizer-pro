# docker-compose para a instância EC2.
# Sobe: MySQL 8 (com volume persistente) -> migração do schema -> app Node.
# Variáveis vêm do arquivo deploy/.env (ver deploy/.env.example).

services:
  db:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    build:
      context: ..
      target: build
    command: pnpm drizzle-kit migrate
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: ..
      target: runtime
    restart: always
    env_file:
      - .env
    ports:
      - "80:3000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  dbdata:
